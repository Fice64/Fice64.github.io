<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CaCoCeDe - Fice's Campsite</title>
    
    <link rel="stylesheet" href="style.css">

    <style>
        .cacocede-wrapper {
            max-width: 1100px; /* Wider container to comfortably fit columns side-by-side */
            margin: 0 auto;
            padding: 100px 20px 40px 20px;
        }

        .header-section {
            text-align: center;
            margin-bottom: 40px;
        }

        .page-title {
            font-family: var(--font-highlight);
            color: var(--color-heading);
            font-size: 3rem;
            margin-bottom: 10px;
        }

        /* SEARCH BAR SYSTEM */
        .search-container {
            max-width: 500px;
            margin: 0 auto 40px auto;
        }

        .search-bar {
            width: 100%;
            padding: 14px 20px;
            font-family: var(--font-body);
            font-size: 1rem;
            background-color: var(--bg-card);
            color: var(--color-text);
            border: 2px solid var(--color-accent);
            border-radius: 8px;
            outline: none;
            transition: border-color 0.2s;
        }

        /* Glow effect when someone clicks/taps into the search input */
        .search-bar:focus {
            border-color: var(--color-heading);
        }

        /* MATRIX GRID: Splits layout into 2 main structural columns (Black vs White) */
        .card-matrix {
            display: grid;
            grid-template-columns: 1fr 1fr; /* Equal split layout on desktop screens */
            gap: 30px;
            align-items: start;
        }

        .matrix-column {
            background-color: rgba(0, 0, 0, 0.2);
            padding: 20px;
            border-radius: 10px;
            border: 1px dashed var(--color-accent);
        }

        .column-title {
            font-family: var(--font-highlight);
            font-size: 1.5rem;
            text-align: center;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid var(--color-accent);
        }
        
        /* Individual column styling highlights */
        .black-column .column-title { color: #ffffff; }
        .white-column .column-title { color: var(--color-heading); }

        /* THE CARD DROPDOWN COMPONENT (<details>) */
        .cah-card {
            background-color: var(--bg-card);
            border: 2px solid var(--color-accent);
            border-radius: 8px;
            margin-bottom: 16px;
            overflow: hidden;
            transition: transform 0.2s, border-color 0.2s;
        }

        /* The master anchor click-zone of the dropdown */
        .cah-card summary {
            padding: 20px;
            font-family: var(--font-body);
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            list-style: none; /* Hides default boring browser arrow indicator */
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        /* Custom style variants to simulate real CAH card identities */
        .card-is-black { background-color: #000000; color: #ffffff; border-color: #333333; }
        .card-is-white { background-color: #ffffff; color: #000000; border-color: #dddddd; }

        /* HOVER TACTILE VISUAL EFFECTS */
        .cah-card:hover {
            transform: translateY(-2px);
            border-color: var(--color-heading);
        }

        /* LORE WRAPPER CONTAINER: Opened dynamically when dropdown unfolds */
        .card-lore {
            padding: 15px 20px;
            background-color: rgba(0, 0, 0, 0.4);
            border-top: 1px solid var(--color-accent);
            font-size: 0.95rem;
            line-height: 1.5;
            color: var(--color-text);
        }
        
        /* Keeps text legible if inside a white card layout drop block */
        .card-is-white .card-lore {
            background-color: #f7f3ed;
            color: #231c18;
        }

        /* IMAGE HOUSING WITHIN CARDS */
        .card-media {
            max-width: 100%;
            max-height: 200px;
            object-fit: contain; /* Keeps image proportions scaling without stretching */
            border-radius: 4px;
            margin-top: 5px;
        }

        /* MOBILE RESPONSIVE ADAPTATION: Collapses columns into a single vertical layout */
        @media (max-width: 768px) {
            .card-matrix {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

    <a href="index.html" class="back-home-btn">← Home</a>

    <main class="cacocede-wrapper">
        
        <div class="header-section">
            <h1 class="page-title">CaCoCeDe</h1>
            <p>Our completely unhinged local edition of Cards Against Humanity.</p>
        </div>

        <div class="search-container">
            <input type="text" id="cardSearch" class="search-bar" placeholder="🔍 Search cards by text or keyword...">
        </div>

        <div class="card-matrix">
            
            <section class="matrix-column black-column">
                <h2 class="column-title">Black Cards</h2>
                <div id="blackCardsContainer"></div>
            </section>

            <section class="matrix-column white-column">
                <h2 class="column-title">White Cards</h2>
                <div id="whiteCardsContainer"></div>
            </section>

        </div>

    </main>

    <script>
        /* -------------------------------------------------------------
           THE DATABASE ARRAY: Add all your new cards directly right here!
        ------------------------------------------------------------- */
        const cardsData = [
            {
                text: "Why did the Discord server go silent at 3:00 AM?",
                lore: "This card commemorates the fateful night where everyone concurrently suffered a mental crash during a gaming marathon.",
                type: "black",
                isImage: false,
                imageUrl: ""
            },
            {
                text: "An absolute technical catastrophe on the university server.",
                lore: " Tomas's favorite excuse whenever code refuses to build on deployment tracking tests.",
                type: "white",
                isImage: false,
                imageUrl: ""
            },
            {
                text: "Look at this absolutely cursed frame.",
                lore: "A card explicitly meant for dropping visual chat history elements or ridiculous screenshot anomalies.",
                type: "white",
                isImage: true,
                imageUrl: "https://placehold.co/400x200?text=Cursed+Meme+Placeholder" /* Replace with your actual file path later like: images/meme.webp */
            }
            {
                text: "Carta de prueba.",
                lore: "Uy que gracioso contexto",
                type: "white", // Write "black" or "white"
                isImage: false, // Write true if it displays an image asset instead
            imageUrl: "" // Put "images/yourfile.webp" if isImage is true
            },
        ];

        /* DOM HOOKS: Links code execution directly to the HTML target containers */
        const blackContainer = document.getElementById("blackCardsContainer");
        const whiteContainer = document.getElementById("whiteCardsContainer");
        const searchBar = document.getElementById("cardSearch");

        /* THE ASSEMBLY LINE FUNCTION: Takes an item from our database and compiles it into HTML elements */
        function renderCards(filteredData) {
            // Clear out current items inside the column blocks before redrawing
            blackContainer.innerHTML = "";
            whiteContainer.innerHTML = "";

            filteredData.forEach(card => {
                // Step 1: Initialize the master <details> element
                const detailsElement = document.createElement("details");
                
                // Assign unique stylistic identities based on data states
                if (card.type === "black") {
                    detailsElement.className = "cah-card card-is-black";
                } else {
                    detailsElement.className = "cah-card card-is-white";
                }

                // Step 2: Build out the clickable header (<summary>) block
                const summaryElement = document.createElement("summary");
                
                // If it is an image card, inject text AND an image tag layout setup
                if (card.isImage) {
                    summaryElement.innerHTML = `<span>${card.text}</span><img src="${card.imageUrl}" class="card-media" alt="Card Graphic">`;
                } else {
                    summaryElement.innerHTML = `<span>${card.text}</span>`;
                }

                // Step 3: Compile the dropdown body containing the specific lore
                const loreElement = document.createElement("div");
                loreElement.className = "card-lore";
                loreElement.innerHTML = `<strong>Lore Log:</strong> ${card.lore}`;

                // Step 4: Structurally nest components inside the main details box
                detailsElement.appendChild(summaryElement);
                detailsElement.appendChild(loreElement);

                // Step 5: Route the finished component to its respective column layout lane
                if (card.type === "black") {
                    blackContainer.appendChild(detailsElement);
                } else {
                    whiteContainer.appendChild(detailsElement);
                }
            });
        }

        /* INTERACTIVE SEARCH ENGINE FILTER LOGIC */
        searchBar.addEventListener("input", (event) => {
            const searchTerm = event.target.value.toLowerCase();

            // Filters array to only preserve rows where data text matches search keywords
            const filteredCards = cardsData.filter(card => {
                return card.text.toLowerCase().includes(searchTerm) || card.lore.toLowerCase().includes(searchTerm);
            });

            // Refresh column views using the filtered subset array items
            renderCards(filteredCards);
        });

        // PRIMARY SYSTEM INIT: Runs once when page loads to pull data list items instantly
        renderCards(cardsData);
    </script>
</body>
</html>
