<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CaCoCeDe - Parodia</title>
    
    <link rel="stylesheet" href="style.css">

    <style>
        /* La arquitectura de columnas y diseño responsivo se mantiene intacta */
        .cacocede-wrapper {
            max-width: 1100px;
            margin: 0 auto;
            padding: 100px 20px 40px 20px;
        }

        .header-section {
            text-align: center;
            margin-bottom: 40px;
        }

        .page-title {
            font-family: var(--font-highlight);
            color: var(--color-heading);
            font-size: 3rem;
            margin-bottom: 10px;
        }

        .search-container {
            max-width: 500px;
            margin: 0 auto 40px auto;
        }

        .search-bar {
            width: 100%;
            padding: 14px 20px;
            font-family: var(--font-body);
            font-size: 1rem;
            background-color: var(--bg-card);
            color: var(--color-text);
            border: 2px solid var(--color-accent);
            border-radius: 8px;
            outline: none;
            transition: border-color 0.2s;
        }

        .search-bar:focus {
            border-color: var(--color-heading);
        }

        .card-matrix {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            align-items: start;
        }

        .matrix-column {
            background-color: rgba(0, 0, 0, 0.2);
            padding: 20px;
            border-radius: 10px;
            border: 1px dashed var(--color-accent);
        }

        .column-title {
            font-family: var(--font-highlight);
            font-size: 1.5rem;
            text-align: center;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid var(--color-accent);
        }
        
        .black-column .column-title { color: #ffffff; }
        .white-column .column-title { color: var(--color-heading); }

        .cah-card {
            background-color: var(--bg-card);
            border: 2px solid var(--color-accent);
            border-radius: 8px;
            margin-bottom: 16px;
            overflow: hidden;
            transition: transform 0.2s, border-color 0.2s;
        }

        .cah-card summary {
            padding: 20px;
            font-family: var(--font-body);
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .card-is-black { background-color: #000000; color: #ffffff; border-color: #333333; }
        .card-is-white { background-color: #ffffff; color: #000000; border-color: #dddddd; }

        .cah-card:hover {
            transform: translateY(-2px);
            border-color: var(--color-heading);
        }

        .card-lore {
            padding: 15px 20px;
            background-color: rgba(0, 0, 0, 0.4);
            border-top: 1px solid var(--color-accent);
            font-size: 0.95rem;
            line-height: 1.5;
            color: var(--color-text);
        }
        
        .card-is-white .card-lore {
            background-color: #f7f3ed;
            color: #231c18;
        }

        .card-media {
            max-width: 100%;
            max-height: 200px;
            object-fit: contain;
            border-radius: 4px;
            margin-top: 5px;
        }

        @media (max-width: 768px) {
            .card-matrix {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

    <a href="index.html" class="back-home-btn">← Home</a>
<div class="theme-switcher">
        <button class="theme-btn" onclick="setTheme('default')" title="Original"></button>
        <button class="theme-btn forest-btn" onclick="setTheme('forest')" title="Bosque"></button>
        <button class="theme-btn neon-btn" onclick="setTheme('neon')" title="Neón"></button>
    </div>

    <script>
        // Función que cambia el tema y lo guarda en el navegador
        function setTheme(themeName) {
            // Cambia el atributo en la raíz del documento
            document.documentElement.setAttribute('data-theme', themeName);
            // Guarda la preferencia en el LocalStorage para que al cambiar de página no se reinicie
            localStorage.setItem('fice-theme', themeName);
        }

        // Cuando la página carga, revisamos si el usuario ya había elegido un tema antes
        const savedTheme = localStorage.getItem('fice-theme') || 'default';
        setTheme(savedTheme);
    </script>
    <main class="cacocede-wrapper">
        
        <div class="header-section">
            <h1 class="page-title">CaCoCeDe</h1>
            <p>Nuestra edición local y completamente desquiciada.</p>
        </div>

        <div class="search-container">
            <input type="text" id="cardSearch" class="search-bar" placeholder="🔍 Buscar cartas por texto, lore o palabras clave...">
        </div>

        <div class="card-matrix">
            <section class="matrix-column black-column">
                <h2 class="column-title">Cartas Negras</h2>
                <div id="blackCardsContainer"></div>
            </section>

            <section class="matrix-column white-column">
                <h2 class="column-title">Cartas Blancas</h2>
                <div id="whiteCardsContainer"></div>
            </section>
        </div>

    </main>

    <script>
        /* =========================================================================
           🛠️ LA PLANTILLA DE BACKEND (BASE DE DATOS LOCAL)
           =========================================================================
           Para añadir una nueva carta, simplemente copia el siguiente bloque y
           pégalo dentro del arreglo 'cardsData' separado por una coma:
           
           {
               text: "El texto principal que va en la carta.",
               lore: "Contexto gracioso o historia detrás de la carta (se ve al desplegar).",
               type: "black",  // Escribe "black" para carta negra, o "white" para blanca.
               isImage: false, // Escribe true si la carta es una imagen, false si es solo texto.
               imageUrl: ""    // Si isImage es true, pon la ruta aquí (ej. "images/meme.webp"). Si es false, déjalo vacío.
           },
           ========================================================================= */

        const cardsData = [
            {
                text: "¿Cuál es el verdadero motivo por el que los servidores de la Universidad de Antioquia se caen en época de matrículas?",
                lore: "La leyenda cuenta que no es el exceso de tráfico, sino un experimento fallido de Ingeniería Electrónica en el sótano.",
                type: "black",
                isImage: false,
                imageUrl: ""
            },
            {
                text: "Un lobo-mapache de pelaje café intentando instalar software de Windows en una Mac usando Crossover.",
                lore: "Representación gráfica de Fice Earthwing negándose a abandonar el ecosistema de Apple pero necesitando jugar o trabajar en algo muy específico. La persistencia es clave.",
                type: "white",
                isImage: false,
                imageUrl: ""
            },
            {
                text: "Abandonar un dibujo digital a la mitad porque la anatomía es 'muy difícil' y proceder a intentar pasar el nivel más difícil de Celeste.",
                lore: "Esa necesidad imperiosa de cambiar una frustración artística por una frustración de plataformas precisas. Al final, la perseverancia muscular siempre gana.",
                type: "white",
                isImage: false,
                imageUrl: ""
            },
            {
                text: "El arma secreta que V1 usará en la próxima actualización de Ultrakill es impulsada enteramente por ________.",
                lore: "Imagina las posibilidades mecánicas. Todo se trata de la gestión de inercia y transferencia de energía, conceptos fundamentales si lo piensas bien.",
                type: "black",
                isImage: false,
                imageUrl: ""
            },
            {
                text: "Un beat de Drum & Bass a 174 BPM hecho exclusivamente con sonidos de martillos construyendo props de cosplay.",
                lore: "Cuando la producción musical en Logic Pro y la creación de réplicas de armas de Valorant chocan en un solo proyecto caótico con vibra de música electrónica.",
                type: "white",
                isImage: false,
                imageUrl: ""
            },
            {
                text: "Mirar una película como 'Whiplash' o 'A Silent Voice' a las 3 AM y decidir repentinamente cambiar de carrera.",
                lore: "Ese momento donde la narrativa cinematográfica golpea tan fuerte que te cuestionas toda tu estructura de vida, al menos hasta que amanece.",
                type: "white",
                isImage: false,
                imageUrl: ""
            }
        ];

        /* =========================================================================
           ⚙️ EL MOTOR DE RENDERIZADO Y BÚSQUEDA
           ========================================================================= */

        // 1. Enganchamos los contenedores del HTML al JavaScript
        const blackContainer = document.getElementById("blackCardsContainer");
        const whiteContainer = document.getElementById("whiteCardsContainer");
        const searchBar = document.getElementById("cardSearch");

        // Función auxiliar: Elimina tildes y caracteres especiales de un texto.
        // Esto permite que si el usuario busca "electronica", el sistema encuentre "electrónica".
        function normalizeText(text) {
            return text.normalize("NFD").replace(/[\u0300-\u036f]/g, "").toLowerCase();
        }

        // 2. La fábrica de cartas: Toma los datos y construye los elementos HTML (DOM)
        function renderCards(filteredData) {
            // Limpiamos los contenedores antes de dibujar para no duplicar cartas
            blackContainer.innerHTML = "";
            whiteContainer.innerHTML = "";

            filteredData.forEach(card => {
                // Creamos el contenedor principal desplegable <details>
                const detailsElement = document.createElement("details");
                detailsElement.className = card.type === "black" ? "cah-card card-is-black" : "cah-card card-is-white";

                // Construimos la cabecera visible de la carta <summary>
                const summaryElement = document.createElement("summary");
                
                // Lógica condicional: ¿Es texto puro o incluye imagen?
                if (card.isImage) {
                    summaryElement.innerHTML = `<span>${card.text}</span><img src="${card.imageUrl}" class="card-media" alt="Card Graphic">`;
                } else {
                    summaryElement.innerHTML = `<span>${card.text}</span>`;
                }

                // Construimos el contenedor de Lore (lo que se esconde adentro)
                const loreElement = document.createElement("div");
                loreElement.className = "card-lore";
                loreElement.innerHTML = `<strong>Lore Log:</strong> ${card.lore}`;

                // Ensamblamos las piezas: metemos el título y el lore dentro del <details>
                detailsElement.appendChild(summaryElement);
                detailsElement.appendChild(loreElement);

                // Clasificamos y enviamos a la columna correspondiente
                if (card.type === "black") {
                    blackContainer.appendChild(detailsElement);
                } else {
                    whiteContainer.appendChild(detailsElement);
                }
            });
        }

        // 3. El Sistema de Búsqueda (Filtro en tiempo real)
        searchBar.addEventListener("input", (event) => {
            // Obtenemos lo que el usuario escribió y lo normalizamos (sin tildes, minúsculas)
            const searchTerm = normalizeText(event.target.value);

            // Filtramos el arreglo de datos original
            const filteredCards = cardsData.filter(card => {
                const normalizedText = normalizeText(card.text);
                const normalizedLore = normalizeText(card.lore);
                
                // Si el texto de búsqueda está incluido en el título de la carta O en el lore, sobrevive al filtro.
                return normalizedText.includes(searchTerm) || normalizedLore.includes(searchTerm);
            });

            // Volvemos a dibujar las cartas, pero esta vez solo pasamos el arreglo filtrado
            renderCards(filteredCards);
        });

        // 4. Inicialización: Dibujar todas las cartas por defecto cuando la página carga
        renderCards(cardsData);
    </script>
</body>
</html>
