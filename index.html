<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fice's Campsite</title>

    <link rel="stylesheet" href="style.css">

    <style>
        /* This tiny page-specific block keeps your index page perfectly centered */
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .campsite-container {
            background-color: var(--bg-card);
            width: 100%;
            max-width: 550px;
            min-height: 550px;
            border: 3px solid var(--color-accent);
            border-radius: 12px;
            padding: 40px 30px;
            display: flex;
            flex-direction: column;
            justify-content: space-between; 
            align-items: center;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .main-title { font-family: var(--font-highlight); font-size: 2.5rem; color: var(--color-heading); margin-bottom: 10px; }
        .description { font-size: 1rem; line-height: 1.5; opacity: 0.9; margin-bottom: 30px; }
        .column-menu { width: 100%; display: flex; flex-direction: column; gap: 12px; margin-bottom: 30px; }
        
        .menu-btn {
            font-family: var(--font-buttons);
            font-size: 1.1rem;
            color: var(--color-text);
            background-color: var(--color-button-bg);
            text-decoration: none;
            padding: 12px 20px;
            border: 2px solid transparent;
            border-radius: 6px;
            transition: all 0.2s ease-in-out;
            width: 100%;
            display: block;
        }
        .menu-btn:hover { border-color: var(--color-heading); background-color: transparent; transform: translateY(-2px); }
        .socials-footer { display: flex; gap: 20px; justify-content: center; }
        .social-icon { color: var(--color-text); text-decoration: none; opacity: 0.7; transition: all 0.2s; }
        .social-icon:hover { opacity: 1; color: var(--color-heading); }
    </style>
</head>
  <body>
    <div class="theme-switcher">
        <button class="theme-btn" onclick="setTheme('default')">Vainilla</button>
        <button class="theme-btn forest-btn" onclick="setTheme('forest')">Bosque</button>
        <button class="theme-btn neon-btn" onclick="setTheme('neon')">Neón</button>
    </div>

    <script>
        // Función que cambia el tema y lo guarda en el navegador
        function setTheme(themeName) {
            // Cambia el atributo en la raíz del documento
            document.documentElement.setAttribute('data-theme', themeName);
            // Guarda la preferencia en el LocalStorage para que al cambiar de página no se reinicie
            localStorage.setItem('fice-theme', themeName);
        }

        // Cuando la página carga, revisamos si el usuario ya había elegido un tema antes
        const savedTheme = localStorage.getItem('fice-theme') || 'default';
        setTheme(savedTheme);
    </script>
    <main class="campsite-container">
        <header>
            <h1 class="main-title">Fice's Campsite</h1>
            <p class="description">
                Welcome to Fice & Friends' digital garden! Here you'll find our personal wiki, chaotic quote archives, and other structural updates to our group lore.
            </p>
        </header>

        <nav class="column-menu">
            <a href="about.html" class="menu-btn">About Me</a>
            <a href="timeline.html" class="menu-btn">Group Timeline</a>
            <a href="cacocede.html" class="menu-btn">CACOCEDE</a>
            <a href="relationships.html" class="menu-btn">Relationships</a>
            <a href="gallery.html" class="menu-btn">Gallery & Museum</a>
        </nav>

        <footer class="socials-footer">
            <a href="https://x.com" target="_blank" class="social-icon">𝕏</a>
            <a href="https://instagram.com" target="_blank" class="social-icon">Instagram</a>
            <a href="https://github.com" target="_blank" class="social-icon">GitHub</a>
        </footer>
    </main>
<div class="mini-audio-player">
    <div class="player-title">📻 Campsite Radio</div>
    
    <audio id="campsiteTrack" loop src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3"></audio>
    
    <div class="player-controls">
        <button onclick="document.getElementById('campsiteTrack').play()" class="radio-btn">PLAY</button>
        <button onclick="document.getElementById('campsiteTrack').pause()" class="radio-btn">PAUSE</button>
    </div>
</div>
</body>
</html>
